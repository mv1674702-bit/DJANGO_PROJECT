<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>

<h1>My App</h1>
<h2>Register</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {{ form.errors }}
    <button type="submit">Register</button>
</form>

<p>Already have an account? 
    <a href="{% url 'login' %}">Login</a>
</p>

</body>
</html>
